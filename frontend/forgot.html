<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <style>
    body {
      background: #fff;
      font-family: 'Montserrat', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .forgot-container {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(190,24,24,0.13), 0 2px 8px rgba(0,0,0,0.08);
      padding: 48px 36px 36px 36px;
      max-width: 400px;
      width: 100%;
      margin: 60px auto 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .forgot-title {
      font-size: 2.1em;
      color: #be1818;
      font-weight: 600;
      margin-bottom: 18px;
      letter-spacing: 1px;
      text-align: center;
    }
    .forgot-desc {
      color: #444;
      font-size: 1em;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.5;
    }
    .forgot-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;  /* Added spacing between elements */
    }
    .form-group {
      margin-bottom: 20px;
      width: 100%;
    }
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    .form-input:focus {
      border-color: #be1818;
      outline: none;
    }
    .submit-btn {
      background: #be1818;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px; /* Added top margin */
    }
    .submit-btn:hover {
      background: #9a1414;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(190,24,24,0.15);
    }
    .message {
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    .forgot-form input[type="email"] {
      padding: 14px 16px;
      border-radius: 8px;
      border: 1.5px solid #be1818;
      font-size: 1em;
      font-family: 'Montserrat', Arial, sans-serif;
      outline: none;
      transition: border 0.2s;
    }
    .forgot-form input[type="email"]:focus {
      border: 2px solid #be1818;
    }
    .forgot-btn {
      background: #be1818;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 0;
      font-size: 1.1em;
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(190,24,24,0.13);
    }
    .forgot-btn:hover {
      background: #a81818;
      box-shadow: 0 6px 20px rgba(190,24,24,0.18);
    }
    .back-link {
      margin-top: 18px;
      color: #be1818;
      text-decoration: none;
      font-size: 1em;
      transition: text-decoration 0.2s;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="forgot-container">
    <div class="forgot-title">Forgot Password?</div>
    <div class="forgot-desc">Enter your email address and we'll send you a link to reset your password.</div>
    <form class="forgot-form" autocomplete="off">
      <input type="email" name="email" placeholder="Enter your email" required>
      <button type="submit" class="forgot-btn">Send Reset Link</button>
    </form>
    <div id="message" class="message" style="display: none;"></div>
    <a href="login.html" class="back-link">Back to Login</a>
  </div>

  <script>
    document.querySelector('.forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = e.target.email.value;
      const messageDiv = document.getElementById('message');
      const submitButton = document.querySelector('.forgot-btn');
      
      try {
        submitButton.disabled = true;
        submitButton.textContent = 'Sending...';
        
        const response = await fetch('http://localhost:5000/api/forgot-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json();
        
          messageDiv.style.display = 'block';
          
          if (response.ok) {
            messageDiv.className = 'message success';
            // Fix duplicate message issue by removing repeated text
            const msg = data.message.replace(/\. You have \d+ attempts? remaining today\./g, '');
            messageDiv.textContent = `${msg} You have ${data.emailsRemaining} attempt${data.emailsRemaining === 1 ? '' : 's'} remaining today.`;
            e.target.reset();
          } else {
            messageDiv.className = 'message error';
            // Fix duplicate message issue by removing repeated text
            const msg = data.message.replace(/\. You have \d+ emails remaining today\./g, '');
            messageDiv.textContent = msg;
          }
        } catch (error) {
          messageDiv.style.display = 'block';
          messageDiv.className = 'message error';
          messageDiv.textContent = 'An error occurred. Please try again later.';
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = 'Send Reset Link';
        }
      });
  </script>
</body>
</html>
