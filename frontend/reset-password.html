<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background: #fff;
            font-family: 'Montserrat', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .reset-container {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(190,24,24,0.13), 0 2px 8px rgba(0,0,0,0.08);
            padding: 48px 36px 36px 36px;
            max-width: 400px;
            width: 100%;
            margin: 60px auto 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .reset-title {
            font-size: 2.1em;
            color: #be1818;
            font-weight: 600;
            margin-bottom: 18px;
            letter-spacing: 1px;
            text-align: center;
        }
        .reset-desc {
            color: #444;
            font-size: 1em;
            margin-bottom: 28px;
            text-align: center;
            line-height: 1.5;
        }
        .reset-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            width: 90%;
            max-width: 400px;
            margin: 0 auto;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #be1818;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Montserrat', Arial, sans-serif;
            outline: none;
            transition: border 0.2s;
            box-sizing: border-box;
        }
        .form-input:focus {
            border: 2px solid #be1818;
        }
        .password-requirements {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
        .reset-btn {
            background: #be1818;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px 0;
            width: 90%;
            max-width: 400px;
            margin: 20px auto 0;
            font-size: 1.1em;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(190,24,24,0.13);
            display: block;
        }
        .reset-btn:hover {
            background: #a81818;
            box-shadow: 0 6px 20px rgba(190,24,24,0.18);
        }
        .reset-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-title">Reset Password</div>
        <div class="reset-desc">Please enter your new password below.</div>
        <form class="reset-form" id="resetForm">
            <div class="form-group">
                <input type="password" name="password" class="form-input" placeholder="New Password" required minlength="8">
                <div class="password-requirements">
                    Password must be at least 8 characters long and include uppercase, lowercase, number, and special character.
                </div>
            </div>
            <div class="form-group">
                <input type="password" name="confirmPassword" class="form-input" placeholder="Confirm Password" required minlength="8">
            </div>
            <button type="submit" class="reset-btn">Reset Password</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        if (!token || !email) {
            window.location.href = '/login.html';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = e.target.password.value;
            const confirmPassword = e.target.confirmPassword.value;
            const messageDiv = document.getElementById('message');
            const submitButton = document.querySelector('.reset-btn');

            // Password validation
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            
            if (!passwordRegex.test(password)) {
                messageDiv.style.display = 'block';
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Password must meet all requirements';
                return;
            }

            if (password !== confirmPassword) {
                messageDiv.style.display = 'block';
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Passwords do not match';
                return;
            }

            try {
                submitButton.disabled = true;
                submitButton.textContent = 'Resetting...';

                const response = await fetch('http://localhost:5000/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token,
                        email,
                        password
                    })
                });

                const data = await response.json();
                messageDiv.style.display = 'block';

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = data.message;
                    // Redirect to login page after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message;
                    submitButton.disabled = false;
                    submitButton.textContent = 'Reset Password';
                }
            } catch (error) {
                messageDiv.style.display = 'block';
                messageDiv.className = 'message error';
                messageDiv.textContent = 'An error occurred. Please try again later.';
                submitButton.disabled = false;
                submitButton.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
