<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Strawberry Farm</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            background: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('rem (4).jpg');
            background-size: cover;
            background-position: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo img {
            height: 60px;
        }
        h1 {
            color: rgba(190,24,24,225);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 5px;
            font-size: 1em;
            transition: all 0.3s;
        }
        input:focus {
            border-color: rgba(190,24,24,225);
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: rgba(190,24,24,225);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: rgba(160,20,20,225);
        }
        .error-message {
            color: rgba(190,24,24,225);
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .auth-links {
            margin-top: 20px;
            text-align: center;
        }
        .auth-links a {
            color: rgba(190,24,24,225);
            text-decoration: none;
            font-size: 0.9em;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="logo.svg" alt="Logo">
        </div>
        <h1>User Register</h1>
        <div id="register-error" class="error-message"></div>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn">Register</button>
        </form>
        <div class="auth-links">
            <a href="login.html">Already have an account? Login</a>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').onsubmit = async function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('register-error');
            errorDiv.style.display = 'none';

            // Register via backend API only
            try {
                const response = await fetch('http://localhost:5000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: 'user', name, email, phone, password })
                });
                if (!response.ok) throw new Error('Could not reach registration server');
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('token', email);
                    localStorage.setItem('userRole', 'user');
                    localStorage.setItem('userName', name);
                    localStorage.setItem('userEmail', email);

                    const redirectAfterLogin = localStorage.getItem('redirectAfterLogin');
                    if (redirectAfterLogin && redirectAfterLogin !== 'login.html' && redirectAfterLogin !== 'register.html') {
                        localStorage.removeItem('redirectAfterLogin');
                        window.location.href = redirectAfterLogin;
                        return;
                    }

                    window.location.href = 'cart.html';
                } else {
                    errorDiv.textContent = result.message || 'Registration failed.';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Registration error: ' + err.message;
                errorDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
